name: Apply TAD Phase 2 Admin Audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/phase-2-admin-audit
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/apply-phase2-audit.mjs
      - run: node tests/run-tests.mjs
      - name: Commit verified audit links and tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html admin-systems.html tests/run-tests.mjs
          git commit -m "Wire and verify the Phase 2 Admin Audit"
          git push origin HEAD:feature/phase-2-admin-audit
