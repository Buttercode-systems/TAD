name: Apply TAD Phase 1 blockers

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phase-1-production-blockers
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: mkdir -p supabase/migrations
      - name: Apply patch with assertion capture
        run: |
          set +e
          node scripts/apply-phase1.mjs >/tmp/phase1.log 2>&1
          code=$?
          cat /tmp/phase1.log
          if [ "$code" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/phase1.log phase1-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add phase1-error.txt
            git commit -m "Capture TAD Phase 1 patch failure"
            git push origin HEAD:fix/phase-1-production-blockers
            exit "$code"
          fi
      - run: node tests/run-tests.mjs
      - name: Preserve workflow for token-safe commit
        run: git checkout HEAD -- .github/workflows/phase1-apply.yml
      - name: Commit patched production blockers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix TAD Phase 1 production blockers"
          git push origin HEAD:fix/phase-1-production-blockers
