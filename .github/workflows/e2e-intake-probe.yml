name: Temporary Intake Probe

on:
  push:
    branches: [feature/secure-sales-admin-submission]

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Submit and verify duplicate suppression
        shell: bash
        run: |
          set -euo pipefail
          EMAIL="pipeline-e2e-${GITHUB_RUN_ID}@example.com"
          STARTED_AT="$(( $(date +%s%3N) - 5000 ))"
          BODY=$(cat <<JSON
          {"business":"Pipeline E2E Verification","contact":"Release Check","email":"${EMAIL}","active_records":20,"follow_up_problem":"missed","tools":"WhatsApp and Excel","outcome":"Every open quote must have an owner and next follow-up date","owner_available":true,"data_authority":true,"boundary_accepted":true,"company_website":"","started_at":${STARTED_AT}}
          JSON
          )
          FIRST=$(curl --fail-with-body --silent --show-error \
            -X POST 'https://due-today-six.vercel.app/api/tad/applications' \
            -H 'Origin: https://the-admin-department.vercel.app' \
            -H 'Content-Type: application/json' \
            --data "$BODY")
          SECOND=$(curl --fail-with-body --silent --show-error \
            -X POST 'https://due-today-six.vercel.app/api/tad/applications' \
            -H 'Origin: https://the-admin-department.vercel.app' \
            -H 'Content-Type: application/json' \
            --data "$BODY")
          node -e "const first=JSON.parse(process.argv[1]); const second=JSON.parse(process.argv[2]); if(!first.ok||!first.reference) process.exit(1); if(!second.ok||second.duplicate!==true) process.exit(1); console.log(JSON.stringify({email:process.argv[3],reference:first.reference,firstDuplicate:first.duplicate,secondDuplicate:second.duplicate}));" "$FIRST" "$SECOND" "$EMAIL"
